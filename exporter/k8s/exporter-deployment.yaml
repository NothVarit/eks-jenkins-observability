apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-exporter
  template:
    metadata:
      labels:
        app: pod-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: pod-exporter-sa   # uses RBAC SA above
      containers:
        - name: exporter
          image: pod-exporter:latest
          imagePullPolicy: Never             # use locally built image
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pod-exporter-svc
  namespace: monitoring
spec:
  selector:
    app: pod-exporter
  ports:
    - port: 8000
      targetPort: 8000