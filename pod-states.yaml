apiVersion: v1
kind: Pod
metadata:
  name: pod-ready
  namespace: app-dev
  labels:
    app: sample-app
    state: ready
spec:
  containers:
  - name: app
    image: nginx:alpine
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 15
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi

---

apiVersion: v1
kind: Pod
metadata:
  name: pod-pending
  namespace: app-dev
  labels:
    app: sample-app
    state: pending
spec:
  containers:
  - name: app
    image: this-image-does-not-exist:fake-tag
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi

---

