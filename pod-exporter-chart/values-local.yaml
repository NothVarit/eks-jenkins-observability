namespace: monitoring

# ── Custom Pod Exporter ───────────────────────────────────────────────
customExporter:
  enabled: true
  image: pod-exporter:latest          # ← local image
  imagePullPolicy: IfNotPresent              # ← ไม่ pull จาก registry
  port: 8000
  serviceAccount: pod-exporter-sa
  env:
    KUBE_METRICS_URL: "http://kube-metrics-exporter-svc.monitoring.svc.cluster.local:8080/metrics"
  resources:
    requests:
      cpu: 30m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 5

# ── kube-state-metrics ────────────────────────────────────────────────
kubeMetrics:
  enabled: true
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
  imagePullPolicy: IfNotPresent       # ← pull ครั้งแรกแล้วใช้ cache
  port: 8080
  serviceAccount: kube-metrics-monitor
  resources:
    requests:
      cpu: 30m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ── Prometheus ────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image: prom/prometheus:latest
  imagePullPolicy: IfNotPresent
  port: 9090
  retention: 15d
  scrapeInterval: 15s
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Grafana ───────────────────────────────────────────────────────────
grafana:
  enabled: true
  image: grafana/grafana:latest
  imagePullPolicy: IfNotPresent
  port: 3000
  adminPassword: admin123
  nodePort: 30300
  prometheusUid: PBFA97CFB590B2093
  service:
    type: NodePort                    # ← เปลี่ยนจาก LoadBalancer
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

loki:
  enabled: true
  image: grafana/loki:2.9.0
  port: 3100
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

promtail:
  enabled: true
  image: grafana/promtail:2.9.0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi