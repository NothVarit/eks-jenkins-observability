{{- if .Values.loki.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: {{ .Values.loki.image }}
        ports:
        - containerPort: {{ .Values.loki.port }}
        args:
        - -config.file=/etc/loki/local-config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: loki-svc
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: loki
  ports:
  - port: {{ .Values.loki.port }}
    targetPort: {{ .Values.loki.port }}
{{- end }}