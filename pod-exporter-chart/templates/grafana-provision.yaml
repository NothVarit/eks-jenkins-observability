{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.namespace }}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
    - name: default
      orgId: 1
      type: file
      disableDeletion: false
      updateIntervalSeconds: 30
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.namespace }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: PBFA97CFB590B2093
      url: http://prometheus-svc.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.prometheus.port }}
      access: proxy
      isDefault: true
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-svc.{{ .Values.namespace }}.svc.cluster.local:3100
      access: proxy
      isDefault: false
---
