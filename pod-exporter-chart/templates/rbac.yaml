# ── Custom Exporter RBAC ─────────────────────────────────────────────
{{- if .Values.customExporter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.customExporter.serviceAccount }}
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-exporter-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-exporter-binding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.customExporter.serviceAccount }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: pod-exporter-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- if .Values.kubeMetrics.enabled }}
---
# ── kube-metrics-exporter RBAC ───────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.kubeMetrics.serviceAccount }}
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-metrics-role
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-metrics-binding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.kubeMetrics.serviceAccount }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: kube-metrics-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}